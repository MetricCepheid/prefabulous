name: Prefabulous CI

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rid: [linux-x64, win-x64]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore (solution)
        run: dotnet restore

      # Publish only the Prefabulous CLI for the given RID
      - name: Publish (${{ matrix.rid }})
        run: |
          dotnet publish Prefabulous/Prefabulous.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=false \
            -o publish/${{ matrix.rid }}

      - name: Package (${{ matrix.rid }})
        run: |
          cd publish/${{ matrix.rid }}
          zip -r ../../Prefabulous-${{ matrix.rid }}.zip .
          cd - >/dev/null

      - name: Upload artifact (${{ matrix.rid }})
        uses: actions/upload-artifact@v4
        with:
          name: Prefabulous-${{ matrix.rid }}
          path: Prefabulous-${{ matrix.rid }}.zip
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: Prefabulous-*
          merge-multiple: true

      - name: Create/Update release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: continuous-${{ github.run_number }}
          name: Prefabulous Continuous Build ${{ github.run_number }}
          draft: false
          prerelease: true
          files: |
            Prefabulous-linux-x64.zip
            Prefabulous-win-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
